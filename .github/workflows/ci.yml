name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./... -v -race -count=1
      - run: go vet ./...

  wfctl-validate-contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: GoCodeAlone/setup-wfctl@42f8bd8b8abc784d84cb19f0daf4497f2832250f
        with:
          version: v0.80.1
      - name: Validate plugin contract
        run: wfctl plugin validate-contract .

